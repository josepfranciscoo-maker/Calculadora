name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ Usar v4 (última disponible)

      - name: Set up Python
        uses: actions/setup-python@v6  # ✅ Usar v6 (con soporte Node.js 24)
        with:
          python-version: "3.11"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv pycparser

      - name: Create Buildozer Config Cache Directory
        run: mkdir -p ~/.buildozer

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      - name: Check for APK files
        run: |
          echo "Contents of bin directory:"
          ls -la bin/ || echo "bin directory does not exist"
          echo "---"
          find . -name "*.apk" -type f || echo "No APK files found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4  # ✅ Usar v4 (última disponible)
        with:
          name: apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4  # ✅ Usar v4 (última disponible)
        with:
          name: build-logs
          path: build.log

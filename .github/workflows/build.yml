name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: oscpu/buildozer-action@master
        with:
          specfile: buildozer.spec

      - name: Check for APK files
        run: |
          echo "Contents of bin directory:"
          ls -la bin/ || echo "bin directory does not exist"
          echo "---"
          find . -name "*.apk" -type f || echo "No APK files found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
